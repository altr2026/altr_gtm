<meta name="robots" content="noindex">
<link rel="canonical" href="https://stage.altr.haus/brands/">

<!-- LinkedIn ad redirect: /kbrands/li → /brands/ with UTM attribution preserved -->
<meta http-equiv="refresh" content="0; url=/brands/?utm_source=linkedin&utm_campaign=kbrand_li">
<script>
(function() {
  var params = new URLSearchParams(location.search);
  var dest = '/brands/?utm_source=linkedin&utm_campaign=kbrand_li';
  params.forEach(function(value, key) {
    if (!['utm_source', 'utm_campaign'].includes(key)) {
      dest += '&' + encodeURIComponent(key) + '=' + encodeURIComponent(value);
    }
  });
  location.replace(dest);
})();
</script>
