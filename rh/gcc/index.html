<!-- LinkedIn ad redirect: /rh/gcc → /rightholders/ with UTM attribution preserved -->
<meta http-equiv="refresh" content="0; url=/rightholders/?utm_source=linkedin&utm_campaign=gcc_rh">
<script>
// JS fallback in case meta refresh is blocked or delayed
(function() {
  var params = new URLSearchParams(location.search);
  var dest = '/rightholders/?utm_source=linkedin&utm_campaign=gcc_rh';
  // Preserve any extra UTM params LinkedIn may append (utm_term, fbclid, etc.)
  params.forEach(function(value, key) {
    if (!['utm_source', 'utm_campaign'].includes(key)) {
      dest += '&' + encodeURIComponent(key) + '=' + encodeURIComponent(value);
    }
  });
  location.replace(dest);
})();
</script>
